<!DOCTYPE html>
<html lang="en">   
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up</title>
        <link rel="stylesheet" href="main.css">
        <script src="api.js" defer></script>
    </head>
    <body class="login-page">
        <div class="login-container">
            <h1 style="color: #fff; font-weight: bold; font-size: 30px;">Sign Up</h1>
            <form id="signup-form" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <label for="name" style="font-weight: bolder; color: #ffffff;">Name:</label>
                <input type="text" id="name" name="name" placeholder="Name" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                 <label for="student-id" style="font-weight: bolder; color: #ffffff;">Student registration number:</label>
                <input type="text" id="student-id" name="identifier" placeholder="Student ID" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                
                <label for="email" style="font-weight: bolder; color: #ffffff;">Email:</label>
                <input type="email" id="email" name="email" placeholder="Email" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                <label for="username" style="font-weight: bolder; color: #ffffff;">Username:</label>
                <input type="text" id="username" name="username" placeholder="Username" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                <label for="password" style="font-weight: bolder; color: #ffffff;">Password:</label>
                <input type="password" id="password" name="password" placeholder="Password" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                <label for="profile-picture" style="font-weight: bolder; color: #ffffff;">Profile picture (optional):</label>
                <input type="file" id="profile-picture" name="profile_picture" accept="image/*" style="color: #ffffff;">
                <button type="submit" class="button" style="background-color: #410202; margin-top: 20px; color: #fff; font-weight: bolder; width: 160px; height: 40px; border-radius: 10px; border: none;">Sign Up</button>
            </form>
            <p id="auth-message" role="alert"></p>
        </div>
        <script>
          document.getElementById('signup-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            const nameParts = form.elements.name.value.trim().split(/\s+/);
            try {
              const username = form.elements.username.value.trim();
              const password = form.elements.password.value;
              const registration = new FormData();
              registration.append('username', username); registration.append('password', password); registration.append('email', form.elements.email.value.trim());
              registration.append('registration_number', form.elements.identifier.value.trim()); registration.append('role', 'STUDENT');
              registration.append('first_name', nameParts.shift() || ''); registration.append('last_name', nameParts.join(' '));
              if (form.elements.profile_picture.files[0]) registration.append('profile_picture', form.elements.profile_picture.files[0]);
              const tokens = await apiRequest('register/', { method: 'POST', body: registration });
              localStorage.setItem('access_token', tokens.access); localStorage.setItem('refresh_token', tokens.refresh);
              window.location.assign('studentDashboard.html');
            } catch (error) { document.getElementById('auth-message').textContent = error.message; }
          });
        </script>
    </body>
</html>
