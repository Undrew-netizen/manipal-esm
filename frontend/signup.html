<!DOCTYPE html>
<html lang="en">   
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up</title>
        <link rel="stylesheet" href="main.css">
    </head>
    <body class="login-page">
        <div class="login-container">
            <h1 style="color: #fff; font-weight: bold; font-size: 30px;">Sign Up</h1>
            <form style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <label for="name" style="font-weight: bolder; color: #ffffff;">Name:</label>
                <input type="text" id="name" placeholder="Name" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                 <label for="student-id" style="font-weight: bolder; color: #ffffff;">Student ID/Staff ID:</label>
                <input type="text" id="student-id" placeholder="Student ID" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                
                <label for="email" style="font-weight: bolder; color: #ffffff;">Email:</label>
                <input type="email" id="email" placeholder="Email" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
                <label for="password" style="font-weight: bolder; color: #ffffff;">Password:</label>
                <input type="password" id="password" placeholder="Password" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
            </form>
            <button type="submit" class="button"
                style="background-color: #410202;
                margin-top: 20px;
                 color: #fff;
                   font-weight: bolder;
                   width: 160px;
                   height: 40px;
                   border-radius: 10px;
                   border: none;
                  "><a href="studentDashboard.html" style="color: #fff; text-decoration: none;">Sign Up</a></button>
        </div>
    </body>
</html>
