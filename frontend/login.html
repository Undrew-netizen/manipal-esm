<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="main.css">
    <script src="api.js" defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        
        <h1 style="color: #fff; font-weight: bold; font-size: 24px;">Login</h1>
        <h1 style="color: #fff; font-weight: bold; font-size: 24px;">welcome back</h1>
        <p style="color: #fff; font-weight: bold; font-size: 20px;">Please enter your credentials to access your account.</p>
        <div class="usr">
            <span style="height: 30px; width:140px;background:transparent; border: 1px solid #fff; border-radius: 20px; text-align: center;">Student</span>
            <span style="height: 30px; width:140px;background:transparent; border: 1px solid #fff; border-radius: 20px; text-align:center">Lecturer</span>
            <span style="height: 30px; width:140px;background:transparent; border: 1px solid #fff; border-radius: 20px; text-align:center">Administrator</span>
        </div>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <label for="username" style="font-weight: bolder; color: #ffffff;">Username:</label>
            <input type="text" id="username" name="username" placeholder="Username" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
            <label for="password" style="font-weight: bolder; color: #fffbfb;">Password:</label>
            <input type="password" id="password" name="password" placeholder="Password" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
            <button type="submit" class="button" style="background-color: #410202; margin-top: 10px; color: #fff; font-weight: bolder; width: 160px; height: 40px; border-radius: 10px; border: 1px solid #fff;">Login</button>
        </form>
        <p id="auth-message" role="alert"></p>
               <p style="color: #fff; font-weight: bold; font-size: 20px;">Don't have an account? <a href="signup.html" style="color: #ffffff; text-decoration: underline;">Sign Up</a></p>
    </div>
    <script>
      document.getElementById('login-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          const tokens = await apiRequest('token/', { method: 'POST', body: JSON.stringify({ username: event.target.username.value, password: event.target.password.value }) });
          localStorage.setItem('access_token', tokens.access); localStorage.setItem('refresh_token', tokens.refresh);
          const user = await apiRequest('profile/');
          window.location.href = dashboardForRole[user.role];
        } catch (error) { showAuthMessage(error.message); }
      });
    </script>
</body>
</html>
