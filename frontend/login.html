<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="main.css">
</head>
<body class="login-page">
    <div class="login-container">
        
        <h1 style="color: #fff; font-weight: bold; font-size: 30px;">Login</h1>
        <h1 style="color: #fff; font-weight: bold; font-size: 24px;">welcome back</h1>
        <p style="color: #fff; font-weight: bold; font-size: 20px;">Please enter your credentials to access your account.</p>
        <div class="usr">
            <span style="height: 30px; width:140px;background:transparent; border: 1px solid #fff; border-radius: 20px; text-align: center;">Student</span>
            <span style="height: 30px; width:140px;background:transparent; border: 1px solid #fff; border-radius: 20px; text-align:center">Lecturer</span>
            <span style="height: 30px; width:140px;background:transparent; border: 1px solid #fff; border-radius: 20px; text-align:center">Administrator</span>
        </div>
        <form style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <label for="username" style="font-weight: bolder; color: #ffffff;">Username:</label>
            <input type="text" id="username" placeholder="Username" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
            <label for="password" style="font-weight: bolder; color: #fffbfb;">Password:</label>
            <input type="password" id="password" placeholder="Password" required style="height: 30px; width: 300px; border-radius: 20px; border: 1px solid #ccc; padding: 5px;">
            
        </form>
        <button type="submit" class="button"
             style="background-color: #410202;
             margin-top: 20px;
              color: #fff;
                font-weight: bolder;
                width: 160px;
                height: 40px;
                border-radius: 10px;
                border: none;
               "><a href="dashboard.html" style="color: #fff; text-decoration: none;">Login</a></button>
               <p style="color: #fff; font-weight: bold; font-size: 20px;">Don't have an account? <a href="signup.html" style="color: #410202; text-decoration: underline;">Sign Up</a></p>
    </div>
</body>
</html>
