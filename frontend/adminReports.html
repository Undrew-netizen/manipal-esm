<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reports | Admin Portal</title><link rel="stylesheet" href="main.css"><script src="api.js" defer></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head><body>
<aside class="portal-sidebar"><div class="portal-brand"><img src="logo manipal.png" class="logo" alt="Manipal EMS logo"><div><h2>Manipal EMS</h2><p class="portal-role">Administrator portal</p></div></div><nav class="portal-nav"><a href="adminDashboard.html">Dashboard</a><a href="adminDashboard.html#users">Course enrolment</a><a href="adminExams.html">Examinations</a><a href="adminResults.html">Results</a><a class="active" href="adminReports.html">Reports</a></nav><a class="portal-logout" href="home.html">Logout</a></aside>
<header class="portal-header"><h1>Reports</h1><div class="portal-header-actions"><span data-current-user>current user</span></div></header><main class="portal-main"><section class="portal-panel"><h2>Results export</h2><p>Download all examination results as a CSV file for analysis or record keeping.</p><button id="download-results" class="portal-button" type="button">Download results CSV</button><p id="report-message" role="alert"></p></section></main><script>document.addEventListener('DOMContentLoaded',()=>document.querySelector('#download-results').addEventListener('click',async()=>{const message=document.querySelector('#report-message');try{const response=await fetch(`${API_BASE}reports/results.csv`,{headers:{Authorization:`Bearer ${localStorage.getItem('access_token')}`}});if(!response.ok)throw new Error('Unable to generate the report.');const url=URL.createObjectURL(await response.blob()),link=document.createElement('a');link.href=url;link.download='results.csv';link.click();URL.revokeObjectURL(url)}catch(error){message.textContent=error.message}}));</script></body></html>
