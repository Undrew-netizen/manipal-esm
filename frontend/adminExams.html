<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Examinations | Admin Portal</title><link rel="stylesheet" href="main.css"><script src="api.js" defer></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head><body>
<aside class="portal-sidebar"><div class="portal-brand"><img src="logo manipal.png" class="logo" alt="Manipal EMS logo"><div><h2>Manipal EMS</h2><p class="portal-role">Administrator portal</p></div></div><nav class="portal-nav"><a href="adminDashboard.html"><i class="fa-solid fa-table-columns"></i>Dashboard</a><a href="adminDashboard.html#users"><i class="fa-solid fa-users"></i>Course enrolment</a><a class="active" href="adminExams.html"><i class="fa-solid fa-calendar-days"></i>Examinations</a><a href="adminResults.html"><i class="fa-solid fa-square-poll-vertical"></i>Results</a><a href="adminReports.html"><i class="fa-solid fa-chart-line"></i>Reports</a></nav><a class="portal-logout" href="home.html">Logout</a></aside>
<header class="portal-header"><h1>Examination management</h1><div class="portal-header-actions"><span data-current-user>current user</span></div></header><main class="portal-main"><p id="admin-exam-message" role="alert"></p><section class="portal-panel"><h2>All examinations</h2><table class="portal-table"><thead><tr><th>Title</th><th>Course</th><th>Lecturer</th><th>Schedule</th><th>Status</th><th>Action</th></tr></thead><tbody id="admin-exams-body"></tbody></table></section></main>
<script>document.addEventListener('DOMContentLoaded',async()=>{const body=document.querySelector('#admin-exams-body'),message=document.querySelector('#admin-exam-message');const load=async()=>{try{const exams=await apiRequest('exams/');body.innerHTML=rows(exams,e=>`<tr><td>${text(e.title)}</td><td>${text(e.course_name)}</td><td>${text(e.lecturer)}</td><td>${text(dateTime(e))}</td><td><span class="portal-badge">${text(e.status)}</span></td><td>${e.status==='DRAFT'?`<button class="portal-button" data-action="publish" data-id="${e.id}">Publish</button>`:e.status==='PUBLISHED'?`<button class="portal-button" data-action="close" data-id="${e.id}">Close</button>`:'—'}</td></tr>`,6)}catch(error){message.textContent=error.message}};body.addEventListener('click',async event=>{const button=event.target.closest('button[data-action]');if(!button)return;try{await apiRequest(`exams/${button.dataset.id}/${button.dataset.action}/`,{method:'POST'});message.textContent=`Exam ${button.dataset.action}d successfully.`;load()}catch(error){message.textContent=error.message}});load()});</script></body></html>
