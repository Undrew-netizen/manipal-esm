<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Results | Admin Portal</title><link rel="stylesheet" href="main.css"><script src="api.js" defer></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head><body>
<aside class="portal-sidebar"><div class="portal-brand"><img src="logo manipal.png" class="logo" alt="Manipal EMS logo"><div><h2>Manipal EMS</h2><p class="portal-role">Administrator portal</p></div></div><nav class="portal-nav"><a href="adminDashboard.html">Dashboard</a><a href="adminDashboard.html#users">Course enrolment</a><a href="adminExams.html">Examinations</a><a class="active" href="adminResults.html">Results</a><a href="adminReports.html">Reports</a></nav><a class="portal-logout" href="home.html">Logout</a></aside>
<header class="portal-header"><h1>Results management</h1><div class="portal-header-actions"><span data-current-user>current user</span></div></header><main class="portal-main"><p id="result-message" role="alert"></p><section class="portal-panel"><h2>All examination results</h2><table class="portal-table"><thead><tr><th>Exam</th><th>Course</th><th>Score</th><th>Percentage</th><th>Grade</th><th>Outcome</th><th>Action</th></tr></thead><tbody id="admin-results-body"></tbody></table></section></main>
<script>document.addEventListener('DOMContentLoaded',async()=>{const body=document.querySelector('#admin-results-body'),message=document.querySelector('#result-message');const load=async()=>{try{const results=await apiRequest('results/');body.innerHTML=rows(results,r=>`<tr><td>${text(r.exam_title)}</td><td>${text(r.course_name)}</td><td>${text(r.total_marks)}</td><td>${text(r.percentage)}%</td><td>${text(r.grade)}</td><td>${r.passed?'Pass':'Fail'}</td><td>${r.published_at?'Published':`<button class="portal-button" data-id="${r.id}">Publish</button>`}</td></tr>`,7)}catch(error){message.textContent=error.message}};body.addEventListener('click',async event=>{const button=event.target.closest('button[data-id]');if(!button)return;try{await apiRequest(`results/${button.dataset.id}/publish/`,{method:'POST'});message.textContent='Result published successfully.';load()}catch(error){message.textContent=error.message}});load()});</script></body></html>
