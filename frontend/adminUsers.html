<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Users and Notifications | Admin Portal</title><link rel="stylesheet" href="main.css"><script src="api.js" defer></script></head><body><aside class="portal-sidebar"><div class="portal-brand"><img src="logo manipal.png" class="logo" alt="Manipal EMS logo"><div><h2>Manipal EMS</h2><p class="portal-role">Administrator portal</p></div></div><nav class="portal-nav"><a href="adminDashboard.html">Dashboard</a><a class="active" href="adminUsers.html">Users &amp; alerts</a><a href="adminExams.html">Examinations</a><a href="adminResults.html">Results</a><a href="adminReports.html">Reports</a></nav><a class="portal-logout" href="home.html">Logout</a></aside><header class="portal-header"><h1>User administration</h1><div class="portal-header-actions"><span data-current-user>current user</span></div></header><main class="portal-main"><p id="admin-message" role="alert"></p><section class="portal-panel"><h2>Assign a lecturer to a department</h2><form id="department-form" style="display:flex;gap:10px;flex-wrap:wrap"><select name="lecturer" required><option value="">Select lecturer</option></select><select name="department" required><option value="">Select department</option></select><button class="portal-button">Assign department</button></form></section><section class="portal-panel"><h2>Send an announcement</h2><form id="notification-form" style="display:grid;gap:10px;max-width:680px"><input name="title" placeholder="Notification title" required><textarea name="message" placeholder="Message" required></textarea><select name="role"><option value="">All active users</option><option value="STUDENT">All students</option><option value="LECTURER">All lecturers</option><option value="ADMIN">All administrators</option></select><button class="portal-button">Send notification</button></form></section></main><script>document.addEventListener('DOMContentLoaded',async()=>{const message=document.querySelector('#admin-message'),departmentForm=document.querySelector('#department-form');try{const [users,departments]=await Promise.all([apiRequest('users/'),apiRequest('departments/')]);departmentForm.lecturer.innerHTML='<option value="">Select lecturer</option>'+users.filter(user=>user.role==='LECTURER').map(user=>`<option value="${user.id}">${text(`${user.first_name} ${user.last_name}`.trim()||user.username)}</option>`).join('');departmentForm.department.innerHTML='<option value="">Select department</option>'+departments.map(department=>`<option value="${department.id}">${text(department.name)}</option>`).join('')}catch(error){message.textContent=error.message}departmentForm.addEventListener('submit',async event=>{event.preventDefault();try{await apiRequest(`users/${departmentForm.lecturer.value}/`,{method:'PATCH',body:JSON.stringify({department:departmentForm.department.value})});message.textContent='Lecturer department assigned.'}catch(error){message.textContent=error.message}});document.querySelector('#notification-form').addEventListener('submit',async event=>{event.preventDefault();const form=event.currentTarget;try{const result=await apiRequest('notifications/broadcast/',{method:'POST',body:JSON.stringify({title:form.title.value,message:form.message.value,role:form.role.value})});message.textContent=`Notification sent to ${result.sent} users.`;form.reset()}catch(error){message.textContent=error.message}})});</script></body></html>
